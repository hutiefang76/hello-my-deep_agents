# ============================================================
# hello-my-deep_agents · 仅中间件 (Middleware-Only) Compose
#
# 用途: IDEA-first 路径专用 — Python 在 IDEA/PyCharm 里直接跑,
#       Docker 只负责跑 pgvector + redis 两个中间件,
#       像 Java 工程师在 IDEA 跑 Spring Boot + 本地 docker 起 MySQL/Redis 一样.
#
# 启动:
#   docker compose -f docker-compose.middleware.yml up -d
#   或 make mw-up
#
# 验证:
#   docker compose -f docker-compose.middleware.yml ps
#   pgvector + redis 状态显示 healthy 即 OK
#
# 关掉:
#   docker compose -f docker-compose.middleware.yml down
#   或 make mw-down
#
# 注: 数据卷 pgvector_data / redis_data 与 docker-compose.yml 同名,
#     两条路径共用同一份数据 (project name 一致时), 切换路径不丢数据.
# ============================================================

services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: deepagents-pgvector
    environment:
      POSTGRES_DB: ${PGVECTOR_DATABASE:-deepagents}
      POSTGRES_USER: ${PGVECTOR_USER:-deepagents}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-deepagents123}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-deepagents}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: deepagents-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgvector_data:
  redis_data:
