# ============================================================
# hello-my-deep_agents · 中间件
# 启动: docker compose up -d pgvector redis
# 停止: docker compose down
# 清数据: docker compose down -v
#
# 仅 Ch4.2.1 (Memory) 和 Ch4.2.3 (RAG) lab 需要
# 其他 lab 不依赖中间件, 可裸跑
# ============================================================

services:
  # PostgreSQL + pgvector 扩展 (向量库 + 关系库二合一)
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: deepagents-pgvector
    environment:
      POSTGRES_DB: ${PGVECTOR_DATABASE:-deepagents}
      POSTGRES_USER: ${PGVECTOR_USER:-deepagents}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-deepagents123}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-deepagents}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis (会话记忆 / LangGraph Checkpointer)
  redis:
    image: redis:7-alpine
    container_name: deepagents-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgvector_data:
  redis_data:
