# ============================================================
# hello-my-deep_agents · 完整 Docker 化栈
#
# 跨平台跑 (macOS / Windows / Linux), 只要装了 Docker:
#
#   1. cp .env.example .env  (填 DASHSCOPE_API_KEY)
#   2. docker compose up -d              # 起所有服务 (app + pgvector + redis + gradio)
#   3. docker compose run --rm app bash  # 进 app 容器跑 lab
#   4. docker compose logs -f gradio     # 看 Gradio 日志, 浏览器开 :7861
#
# 服务清单:
#   app       Python 3.11 + 全部依赖, 跑 lab 用
#   gradio    Ch4.3 全功能 Gradio UI (port 7861)
#   pgvector  向量库 (Memory / RAG lab)
#   redis     会话存储 (Memory lab)
# ============================================================

services:
  # ===== 主应用容器 (跑 lab 脚本用) =====
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepagents-tutorial:latest
    container_name: deepagents-app
    env_file:
      - .env
    environment:
      # 容器内连中间件用容器名 (覆盖 .env 中 localhost 配置)
      PGVECTOR_HOST: pgvector
      REDIS_HOST: redis
    volumes:
      # 代码挂载: 改文件不用重 build
      - ./labs:/app/labs
      - ./common:/app/common
      - ./scripts:/app/scripts
      - ./docs:/app/docs
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: ["bash"]

  # ===== Gradio 全功能 UI (Ch4.3 集大成 demo) =====
  gradio:
    build:
      context: .
      dockerfile: Dockerfile
    image: deepagents-tutorial:latest
    container_name: deepagents-gradio
    env_file:
      - .env
    environment:
      PGVECTOR_HOST: pgvector
      REDIS_HOST: redis
      GRADIO_PORT: "7861"
    ports:
      - "7861:7861"
    volumes:
      - ./labs:/app/labs
      - ./common:/app/common
      - ./scripts:/app/scripts
    depends_on:
      pgvector:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["python", "labs/ch04-3-summary/src/02_gradio_full_ui.py"]
    restart: unless-stopped

  # ===== PostgreSQL + pgvector =====
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: deepagents-pgvector
    environment:
      POSTGRES_DB: ${PGVECTOR_DATABASE:-deepagents}
      POSTGRES_USER: ${PGVECTOR_USER:-deepagents}
      POSTGRES_PASSWORD: ${PGVECTOR_PASSWORD:-deepagents123}
    ports:
      - "${PGVECTOR_PORT:-5432}:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./scripts/init-pgvector.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PGVECTOR_USER:-deepagents}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ===== Redis =====
  redis:
    image: redis:7-alpine
    container_name: deepagents-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgvector_data:
  redis_data:
